name: Build Logical backup

on:
  schedule:
    - cron: '0 0 6 * *'
  push:
    branches: ["main"]
    paths:
      - "postgres-logical-backup/**"
      - ".github/workflows/postgres-logical-backup.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: ghcr.io/obmondo/postgres-logical-backup
          tags: |
            type=schedule,pattern={{date 'YY.M'}}.0
            type=raw,value=latest
          flavor: |
            latest=false
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push container image
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          file: "./postgres-logical-backup/Dockerfile"
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
